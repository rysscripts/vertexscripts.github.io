<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pro Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at top, #1a0b2e, #020617);
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  margin-top: 40px;
}

.logo {
  font-size: 50px;
  font-weight: bold;
  background: linear-gradient(90deg, #a855f7, #3b82f6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* STATS */
.stats {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

/* TABS */
.tabs {
  display: flex;
  justify-content: center;
  margin-top: 20px;
  gap: 15px;
}

.tab {
  padding: 10px 20px;
  border-radius: 20px;
  background: #0f172a;
  cursor: pointer;
  transition: 0.2s;
}

.tab.active {
  background: linear-gradient(90deg, #a855f7, #3b82f6);
}

/* SEARCH */
.search {
  margin-top: 20px;
  padding: 12px;
  width: 300px;
  border-radius: 30px;
  border: none;
  background: #0f172a;
  color: white;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 25px;
  padding: 40px;
}

/* CARD */
.card {
  position: relative;
  background: rgba(15,23,42,0.9);
  padding: 20px;
  border-radius: 20px;
  overflow: hidden;
}

/* ANIMATED BORDER */
.card::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 20px;
  background: linear-gradient(120deg, #a855f7, #3b82f6, #a855f7);
  animation: rotate 4s linear infinite;
  z-index: 0;
}

.card::after {
  content: "";
  position: absolute;
  inset: 2px;
  background: #0f172a;
  border-radius: 18px;
  z-index: 1;
}

.card * {
  position: relative;
  z-index: 2;
}

@keyframes rotate {
  0% {transform: rotate(0deg);}
  100% {transform: rotate(360deg);}
}

.status {
  color: #22c55e;
  font-size: 12px;
}

.badge {
  display: inline-block;
  background: #f59e0b;
  color: black;
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 6px;
  margin-left: 5px;
}

.code {
  background: black;
  padding: 10px;
  border-radius: 8px;
  margin: 10px 0;
}

/* BUTTON */
button {
  background: linear-gradient(90deg, #a855f7, #3b82f6);
  border: none;
  padding: 12px;
  width: 100%;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

/* SECTIONS */
.section { display: none; }
.section.active { display: block; animation: fade 0.3s ease; }

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">PRO HUB</div>

  <div class="stats">
    👥 <span id="users"></span> users online • 📦 <span id="count"></span> scripts
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('scripts', this)">Scripts</div>
    <div class="tab" onclick="switchTab('downloads', this)">Downloads</div>
    <div class="tab" onclick="switchTab('socials', this)">Socials</div>
  </div>

  <input class="search" placeholder="Search..." oninput="search(this.value)">
</div>

<!-- SCRIPTS -->
<div id="scripts" class="section active">
  <div class="grid" id="grid"></div>
</div>

<!-- DOWNLOADS -->
<div id="downloads" class="section">
  <div class="grid">
    <div class="card">
      <h3>Executor</h3>
      <button onclick="alert('Add your link')">Download</button>
    </div>
  </div>
</div>

<!-- SOCIALS -->
<div id="socials" class="section">
  <div class="grid">
    <div class="card">
      <h3>YouTube</h3>
      <button onclick="window.open('https://youtube.com')">Visit</button>
    </div>
    <div class="card">
      <h3>TikTok</h3>
      <button onclick="window.open('https://tiktok.com')">Visit</button>
    </div>
  </div>
</div>

<script>

// 🔊 SOUND
const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

// DATA
let scripts = [
  {
    name: "MM2 Script",
    game: "MM2",
    display: "MM2 OP Script",
    popular: true,
    copy: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/rysscripts/mm2/refs/heads/main/loader.lua"))()'
  },
  {
    name: "Adopt Me Script",
    game: "Adopt Me",
    display: "Adopt Me OP Script",
    popular: true,
    copy: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/rysscripts/adoptme/refs/heads/main/loader.lua"))()'
  },
  {
    name: "STEAL A BRAINROT SCRIPT",
    game: "SAB",
    display: "Brainrot Script",
    popular: false,
    copy: 'loadstring(game:HttpGet("https://raw.githubusercontent.com/rysscripts/adoptme/refs/heads/main/loader.lua"))()'
  }
];

let allData = scripts;

// RENDER
function render(data) {
  document.getElementById("count").innerText = data.length;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach((item, i) => {
    grid.innerHTML += `
      <div class="card">
        <div class="status">● WORKING</div>
        <h2>
          ${item.name}
          ${item.popular ? '<span class="badge">POPULAR</span>' : ''}
        </h2>
        <small>${item.game}</small>

        <div class="code">${item.display}</div>

        <button id="btn${i}" onclick="copyScript(${i})">
          Copy Script 📋
        </button>
      </div>
    `;
  });
}

// SEARCH
function search(q) {
  const filtered = allData.filter(x =>
    x.name.toLowerCase().includes(q.toLowerCase()) ||
    x.game.toLowerCase().includes(q.toLowerCase())
  );
  render(filtered);
}

// COPY
function copyScript(i) {
  clickSound.play();

  navigator.clipboard.writeText(allData[i].copy);

  const btn = document.getElementById("btn" + i);
  btn.innerText = "Success! 📜 Script Copied";

  setTimeout(() => {
    btn.innerText = "Copy Script 📋";
  }, 2000);
}

// TABS
function switchTab(id, el) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

// FAKE LIVE USERS
setInterval(() => {
  document.getElementById("users").innerText = Math.floor(Math.random() * 200 + 50);
}, 2000);

// INIT
render(allData);

</script>

</body>
</html>
